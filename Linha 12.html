<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linha 12</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ESTILOS DA JANELA DE AVISO PERSONALIZADA (MODAL) */
        .modal-alerta {
            display: none; 
            position: fixed; 
            z-index: 9999; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.7); 
            justify-content: center;
            align-items: center;
        }
        .modal-conteudo {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-family: Arial, sans-serif;
        }
        .modal-conteudo h2 {
            color: #d9534f;
            margin-top: 0;
            font-size: 24px;
        }
        .modal-conteudo p {
            font-size: 18px;
            color: #333;
            margin: 20px 0;
        }
        .modal-btn {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal-btn:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body class="body">

    <audio id="audio-alarme" src="bip.mp3" preload="auto"></audio>

    <div id="meu-modal-alerta" class="modal-alerta">
        <div class="modal-conteudo">
            <h2>⚠️ ATENÇÃO!</h2>
            <p id="texto-alerta-dinamico">Já se passaram 30 minutos desde a última inspeção!</p>
            <button class="modal-btn" onclick="fecharAvisoEPararSom()">OK, entendi</button>
        </div>
    </div>

    <div class="head"><h1>Inspeção de qualidade - Linha 12</h1></div>

    <form id="form-inspecao" onsubmit="enviarParaPlanilha(event)" oninput="salvarRascunhoCampos()">
        <input type="hidden" id="input-linha-producao" name="linha_origem" value="">
        
        <div class="input-garrafa">
            <input type="text" id="input-garrafa" name="nome_garrafa" placeholder="Nome Garrafa" required>
            <input type="text" id="input-preforma" name="numero_preforma" placeholder="Numero Preforma" required>
            
            <div class="campo-grupo">
                <label for="select-turno">Turno:</label>
                <select id="select-turno" name="turno_trabalho" required>
                    <option value="">-- Selecione o Turno --</option>
                    <option value="A">Turno A</option>
                    <option value="B">Turno B</option>
                    <option value="C">Turno C</option>
                    <option value="D">Turno D</option>
                </select>
            </div>
            <div class="realizado"><label for="realizado_por">Realizado Por:</label>
                <input type="text" id="input-name" name="realizado_por" placeholder="Seu Nome" required>
            </div>
        </div>
        
        <div class="b-defeitos">
            <div class="b">
                <input type="radio" id="def-gargalo" name="defeito_selected" value="deformacao_gargalo" required>
                <label for="def-gargalo">Deformação no gargalo</label>
            </div>
            <div class="b">
                <input type="radio" id="def-furos" name="defeito_selected" value="furos_rachaduras">
                <label for="def-furos">Furos, rachaduras ou deformações</label>
            </div>
            <div class="b">
                <input type="radio" id="def-rotulo" name="defeito_selected" value="rotulo_descentralizado">
                <label for="def-rotulo">Rótulo descentralizado</label>
            </div>
            <div class="b">
                <input type="radio" id="def-tonalidade" name="defeito_selected" value="tonalidade_garrafa">
                <label for="def-tonalidade">Tonalidade da Garrafa</label>
            </div>
            <div class="b">
                <input type="radio" id="def-fundo" name="defeito_selected" value="deformacao_fundo">
                <label for="def-fundo">Deformação No Fundo</label>
            </div>
            <div class="b">
                <input type="radio" id="status-ok" name="defeito_selected" value="conforme">
                <label for="status-ok">Conforme</label>
            </div>
        </div>
        
        <div class="b-space">
            <a href="index.html" style="text-decoration: none;"><div class="back"><h1>Voltar</h1></div></a>
            <button type="submit" class="send">Enviar</button>
        </div>
    </form>

    <script>
    // 1. Carrega o nome da linha e restaura o que estava digitado
    document.addEventListener("DOMContentLoaded", function() {
        const linhaGuardada = localStorage.getItem('linhaSelecionada');
        if (linhaGuardada) {
            document.getElementById('input-linha-producao').value = linhaGuardada;
        } else {
            document.getElementById('input-linha-producao').value = "Linha 12"; 
        }

        // Restaura os dados salvos automaticamente ao abrir a página
        if(localStorage.getItem('rascunho_garrafa')) document.getElementById('input-garrafa').value = localStorage.getItem('rascunho_garrafa');
        if(localStorage.getItem('rascunho_preforma')) document.getElementById('input-preforma').value = localStorage.getItem('rascunho_preforma');
        if(localStorage.getItem('rascunho_turno')) document.getElementById('select-turno').value = localStorage.getItem('rascunho_turno');
        if(localStorage.getItem('rascunho_nome')) document.getElementById('input-name').value = localStorage.getItem('rascunho_nome');
    });

    // Função que mantém salvo tudo o que está escrito na tela
    function salvarRascunhoCampos() {
        localStorage.setItem('rascunho_garrafa', document.getElementById('input-garrafa').value);
        localStorage.setItem('rascunho_preforma', document.getElementById('input-preforma').value);
        localStorage.setItem('rascunho_turno', document.getElementById('select-turno').value);
        localStorage.setItem('rascunho_nome', document.getElementById('input-name').value);
    }

    function enviarParaPlanilha(event) {
        event.preventDefault(); 
        
        let urlScript = "https://script.google.com/macros/s/AKfycbzN8WUhy3A51tejBugQDWZMhzi3OmdmuroNSPiQ32wRCxC2GxyPUgT94AfdgofmWjVO/exec"; 
        const formulario = document.getElementById('form-inspecao');
        
        let linhaGuardada = localStorage.getItem('linhaSelecionada');
        if (!linhaGuardada) { linhaGuardada = "Linha 12"; }

        const nomeGarrafa = document.getElementById('input-garrafa').value;
        const numeroPreforma = document.getElementById('input-preforma').value;
        const turnoTrabalho = document.getElementById('select-turno').value;
        const realizadoPor = document.getElementById('input-name').value;
        const defeitoMarcado = formulario.querySelector('input[name="defeito_selected"]:checked');
        const defeitoSelected = defeitoMarcado ? defeitoMarcado.value : "";
        
        const dadosCorpo = new URLSearchParams();
        dadosCorpo.append("linha_origem", linhaGuardada);
        dadosCorpo.append("turno_trabalho", turnoTrabalho);
        dadosCorpo.append("nome_garrafa", nomeGarrafa);
        dadosCorpo.append("numero_preforma", numeroPreforma);
        dadosCorpo.append("realizado_por", realizadoPor);
        dadosCorpo.append("defeito_selected", defeitoSelected);

        const botao = document.querySelector('.send');
        botao.innerText = "Enviando...";
        botao.disabled = true;

        fetch(urlScript, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: dadosCorpo.toString()
        })
        .then(() => {
            alert("Inspeção registrada com sucesso!");
            
            // CORREÇÃO: Removidos os comandos de reset. Os dados continuam fixos na tela e na memória.
            resetarTemporizadorInspecao();
            
            botao.innerText = "Enviar";
            botao.disabled = false;
        })
        .catch(erro => {
            alert("Erro crítico de conexão.");
            botao.innerText = "Enviar";
            botao.disabled = false;
        });
    }

    // CONFIGURAÇÃO DO ALERTA (CRONÓMETRO)
    const TEMPO_LIMITE_MINUTOS = 10; 
    let cronometroInspecao;
    let intervaloSomRepetitivo;

    function reproduzirBipFisico() {
      var som = document.getElementById("audio-alarme");
      if (som) {
        try {
          som.pause();
          som.currentTime = 0; 
          var playPromise = som.play();
          if (playPromise !== undefined) {
            playPromise.catch(function(error) { console.log("Erro de play:", error); });
          }
        } catch (e) { console.log("Erro áudio:", e); }
      }
    }

    document.addEventListener('click', function() {
      if (contextoAudioGlobal && contextoAudioGlobal.state === 'suspended') {
         contextoAudioGlobal.resume();
      }
    }, { once: true });

    function resetarTemporizadorInspecao() {
      if (cronometroInspecao) clearTimeout(cronometroInspecao);
      if (intervaloSomRepetitivo) clearInterval(intervaloSomRepetitivo);

      const tempoMilissegundos = TEMPO_LIMITE_MINUTOS * 60 * 1000;

      cronometroInspecao = setTimeout(function() {
        dispararAvisoVisualESonoro();
      }, tempoMilissegundos);
    }

    function dispararAvisoVisualESonoro() {
      reproduzirBipFisico();
      intervaloSomRepetitivo = setInterval(reproduzirBipFisico, 10000); 
      
      document.getElementById("texto-alerta-dinamico").innerText = "⚠️ ATENÇÃO: Já se passaram " + TEMPO_LIMITE_MINUTOS + " minutos desde a última inspeção!";
      document.getElementById("meu-modal-alerta").style.display = "flex";
    }

    function fecharAvisoEPararSom() {
      document.getElementById("meu-modal-alerta").style.display = "none";
      if (intervaloSomRepetitivo) clearInterval(intervaloSomRepetitivo);
      cronometroInspecao = setTimeout(dispararAvisoVisualESonoro, 5 * 60 * 1000);
    }

    window.addEventListener("load", function() {
      resetarTemporizadorInspecao();
    });
    </script>
</body>
</html>
